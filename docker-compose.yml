services:
  web:
    image: bookit:latest
    build: 
      context: ./HotelReservationSystem
      dockerfile: HotelReservationSystem.Web/Dockerfile
    container_name: bookit_web
    ports:
      - "8080:8080"
    networks:
      - bookit-prod
    environment:
      - ConnectionStrings__Default=${CONN_STRING}
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__AzureStorage=${AZURITE_CONN_STRING}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - ASPNETCORE_ENVIRONMENT=Development 
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    networks:
      - bookit-prod
    env_file:
      - .env
    container_name: bookit_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $${SQL_PASSWORD} -Q \"SELECT 1\" > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: bookit_redis
    ports:
      - "6379:6379"
    networks:
      - bookit-prod
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  workers:
    image: bookit-workers:latest
    build:
      context: ./HotelReservationSystem
      dockerfile: HotelReservationSystem.Workers/Dockerfile
    container_name: bookit_workers
    profiles: ["background"]
    networks:
      - bookit-prod
    environment:
      - ConnectionStrings__DefaultConnection=${CONN_STRING}
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: bookit_azurite
    ports:
      - "10001:10001"
    networks:
      - bookit-prod
    command: "azurite --queueHost 0.0.0.0 --queuePort 10001"